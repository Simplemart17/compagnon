<?xml version="1.0" encoding="UTF-8"?>
<!--
  Companion brand mark — color variant.

  Design rationale:
    • The letterform is "Ç" (C-cedilla) — the canonical French letter that
      English-speakers visually associate with the French language. Anchors
      the app's identity to the language the user is learning.
    • Amber (#F5A623) glyph on navy (#1E3A5F) background mirrors the existing
      design-token system (Colors.primary / Colors.accent at src/lib/design.ts).
    • The C arc is drawn open on the right at ~270° — readable as a "C" at
      24×24 (browser tab favicon) while still anchoring around the cedilla
      hook at ~64×64+.
    • Padding: 20% safe-zone all-around so the design survives the iOS
      rounded-corner mask + Android adaptive-icon ~33% safe-zone clip.

  Source of truth — modify here, then run `npm run generate-assets` to
  re-render all 6 PNG variants under assets/images/.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background: solid navy primary -->
  <rect width="1024" height="1024" fill="#1E3A5F"/>

  <!-- Subtle radial highlight for depth -->
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#2B4F7F" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1E3A5F" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg-glow)"/>

  <!-- C body — open arc, amber stroke, rounded caps -->
  <!-- Center: (512, 480). Radius: 240. Stroke: 88px. Sweep: top-right to bottom-right via left side. -->
  <path
    d="M 712 340 A 240 240 0 1 0 712 620"
    fill="none"
    stroke="#F5A623"
    stroke-width="88"
    stroke-linecap="round"
  />

  <!-- Cedilla — small hook curling down-left from the bottom-center of the C -->
  <!-- Anchored just below the C's geometric bottom (y = 480 + 240 = 720). -->
  <path
    d="M 512 720 Q 512 800 472 822 Q 442 836 416 822"
    fill="none"
    stroke="#F5A623"
    stroke-width="52"
    stroke-linecap="round"
  />
</svg>
