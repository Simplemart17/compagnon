<?xml version="1.0" encoding="UTF-8"?>
<!--
  Splash screen logo — transparent background; the navy `#1E3A5F` is
  applied by `app.json` `splash.backgroundColor`. resizeMode: "contain"
  fits the glyph inside the viewport at any device aspect ratio.

  Larger than the icon glyph because the splash centers a single mark
  with whitespace around it (icons are framed against the home-screen
  grid; splash is full-screen with one focal point).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- C body — same geometry as icon for brand consistency -->
  <path
    d="M 712 340 A 240 240 0 1 0 712 620"
    fill="none"
    stroke="#F5A623"
    stroke-width="88"
    stroke-linecap="round"
  />
  <!-- Cedilla -->
  <path
    d="M 512 720 Q 512 800 472 822 Q 442 836 416 822"
    fill="none"
    stroke="#F5A623"
    stroke-width="52"
    stroke-linecap="round"
  />
  <!--
    NOTE: the "Companion" wordmark is NOT in this SVG.
    sharp's underlying librsvg does not ship font rendering, so any <text>
    element here would silently render to nothing. Instead the wordmark is
    drawn by the AnimatedSplash React component (src/components/common/
    AnimatedSplash.tsx) which has full access to the platform text engine
    AND can animate in.
  -->
</svg>
