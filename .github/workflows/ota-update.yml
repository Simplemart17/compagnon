name: EAS Update (OTA)

# Manually triggered. Publishes a JS-only OTA update to the chosen channel.
# Use for bug fixes and content updates that do NOT require native code changes.
# See _bmad-output/planning-artifacts/runbooks/ota-hotfix.md for the full safety checklist.

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Target channel
        required: true
        default: preview
        type: choice
        options: [preview, production]
      message:
        description: Update message (shown in Expo dashboard and required by App Review)
        required: true
        type: string
      platform:
        description: Platform
        required: false
        default: all
        type: choice
        options: [all, ios, android]

jobs:
  publish:
    name: EAS Update -> ${{ github.event.inputs.channel }}
    runs-on: ubuntu-latest
    # Only allow publishing to production from main
    environment: ${{ github.event.inputs.channel == 'production' && 'production' || 'preview' }}

    steps:
      - name: "Guard: production updates must originate from main"
        if: ${{ github.event.inputs.channel == 'production' && github.ref != 'refs/heads/main' }}
        run: |
          echo "::error::Production OTA updates may only be published from the main branch."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Publish OTA update
        id: publish
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_POSTHOG_API_KEY: ${{ secrets.EXPO_PUBLIC_POSTHOG_API_KEY }}
          EXPO_PUBLIC_POSTHOG_HOST: ${{ secrets.EXPO_PUBLIC_POSTHOG_HOST }}
          # The @sentry/react-native/expo config plugin auto-uploads source maps
          # when SENTRY_AUTH_TOKEN is in the env at `eas update` time. No
          # separate sentry-cli step required — running it would double-upload.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          CHANNEL: ${{ github.event.inputs.channel }}
          PLATFORM: ${{ github.event.inputs.platform }}
          MESSAGE: ${{ github.event.inputs.message }}
        run: |
          # Tee the output so the next step can grep for the Sentry upload
          # success line — guards against the silent no-op when
          # SENTRY_AUTH_TOKEN is set but invalid (P8 review).
          eas update \
            --channel "$CHANNEL" \
            --platform "$PLATFORM" \
            --message "$MESSAGE" \
            --non-interactive 2>&1 | tee /tmp/eas-update.log
          # Preserve eas update's exit code through the pipe.
          exit ${PIPESTATUS[0]}

      - name: Verify Sentry source-map upload
        # Skipped if the publish step failed — no point checking for source
        # maps if no bundle shipped.
        if: success()
        run: |
          # The @sentry/react-native/expo plugin emits an "uploaded" line on
          # success and a "skipped" / "warning" line on no-op. We require the
          # success line; otherwise production stack traces from this OTA
          # will be minified and undebuggable (P8 review).
          if grep -qiE 'sentry.*(release artifacts|source maps).*upload(ed)? successfully' /tmp/eas-update.log; then
            echo "✓ Sentry source maps uploaded"
          else
            echo "::error title=Sentry source maps not uploaded::SENTRY_AUTH_TOKEN may be invalid, revoked, or wrong-scope. Production crashes from this OTA will be minified. Check token at sentry.io/settings/account/api/auth-tokens (needs project:write + project:releases on the companion project)."
            exit 1
          fi
