name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Type Check & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

      - name: Tests
        run: npm test -- --no-coverage

      - name: Setup Deno
        # Story 15-3: install Deno for Edge Function _shared utility tests.
        # Pinned to the latest v1 (Deno 2.0 has breaking changes; defer 2.0
        # migration to a follow-up story). The action caches the install for
        # faster subsequent runs.
        uses: denoland/setup-deno@v2
        with:
          deno-version: v1.x

      - name: Deno tests (Edge Function _shared utilities)
        # Story 15-3: wire Story 11-3 fetch-with-timeout + Story 12-11
        # parse-upstream-error Deno tests into CI. Pre-15-3 these were
        # manual-run only. Now gated on PR merge. The `--allow-net=127.0.0.1`
        # permission is required by the fetch-with-timeout happy-path test
        # which spins up a local HTTP server. NO `--allow-all` — keep the
        # permission surface minimal.
        # pgTAP migrations (supabase/migrations/__tests__/*.sql) NOT wired
        # here — requires a Postgres service container. Deferred to
        # `15-3-followup-pgtap-ci-wiring`.
        run: deno test --allow-net=127.0.0.1 supabase/functions/_shared/__tests__/

      - name: Dependency vulnerability gate
        # Story 12-10: prevent regression of `npm audit reports 0 high
        # vulnerabilities` (Epic 12 AC). Calibrated to `--audit-level=high`
        # — zero-tolerance for high/critical; documented-tolerance for
        # moderate/low limited to dev/build-time exposure (current
        # inventory in `_bmad-output/planning-artifacts/runbooks/dependency-vulnerability-policy.md`).
        # Includes dev-deps deliberately: a high-severity dev-dep vuln can
        # exfiltrate secrets from a dev's machine OR a CI runner. The bar
        # for "high" is high enough that we want the gate to fire even
        # for dev-deps.
        run: npm audit --audit-level=high

      - name: Hex color check
        run: npm run check:colors

      - name: Design token check
        # Story 14-4: prevent regression of raw `rounded-[Npx]` className
        # literals and raw shadow* primitives in JS-style objects. Enforce
        # `Radii.*` + `Shadows.*` tokens from @/src/lib/design as the
        # single source of truth (matches the Story 13-7 frozen-static-style
        # discipline). Allowlist: src/lib/design.ts (token definitions).
        # Magic-comment escape hatch: `design-token-exempt` per-line tag.
        run: npm run check:tokens

      - name: Sentry DSN leak guard
        run: |
          # Story 9-3: prevent regression of the leak that triggered the story.
          # A DSN URL must never live in source — only in EXPO_PUBLIC_SENTRY_DSN env.
          # Pattern matches both regional and non-regional Sentry ingest hosts.
          if grep -rE 'https://[A-Za-z0-9]+@[A-Za-z0-9.]+\.ingest(\.[a-z]+)?\.sentry\.io/[0-9]+' \
              --include='*.json' --include='*.ts' --include='*.tsx' --include='*.js' \
              --include='*.yml' --include='*.yaml' --include='*.md' \
              --exclude-dir=node_modules --exclude-dir=.git . ; then
            echo "::error::Sentry DSN URL found in source. DSN must only live in EXPO_PUBLIC_SENTRY_DSN env (see story 9-3)."
            exit 1
          fi
          echo "✓ No Sentry DSN URL in source files"

      - name: Submit credentials leak guard
        run: |
          # Story 9-9: keep Apple/Google submit credentials out of git.
          # Even non-secret IDs (Apple Team ID, ASC App ID) live in EAS env
          # vars, not source — guards against the regression where eas.json
          # shipped with literal placeholders for months.
          MATCHED=0
          # The [_] character class obfuscates the regex source so grep does
          # not match its own pattern when scanning this very workflow file.
          if grep -rE 'YOUR_APPLE[_](ID|TEAM[_]ID)|YOUR_APP[_]STORE[_]CONNECT[_]APP[_]ID' \
              --include='*.json' --include='*.ts' --include='*.tsx' --include='*.js' \
              --include='*.yml' --include='*.yaml' \
              --exclude-dir=node_modules --exclude-dir=.git . ; then
            echo "::error::Submit credential placeholder strings found in source. Move values to EAS env vars (see runbooks/submit-and-deploy.md)."
            MATCHED=1
          fi
          # Apple Team IDs are 10-char alphanumeric. Convention is uppercase
          # but eas.json's schema does not enforce case — `-i` makes the guard
          # also catch lowercase variants (P15 review). Includes `*.md` so a
          # real ID accidentally pasted into a tracked doc as an "example"
          # is caught (P9 review). Excludes the runbook directory because
          # the runbook deliberately uses placeholder examples like
          # `<10-char-team-id>` which wouldn't match anyway, but the carve-out
          # documents the policy.
          if grep -riE '"appleTeamId"\s*:\s*"[A-Z0-9]{10}"' \
              --include='*.json' --include='*.md' \
              --exclude-dir=node_modules --exclude-dir=.git \
              --exclude-dir=_bmad-output . ; then
            echo "::error::Literal Apple Team ID found in source. Use \$EXPO_APPLE_TEAM_ID env reference."
            MATCHED=1
          fi
          # ASC App IDs are 10-digit numeric. Same `--include='*.md'` extension
          # as the Team ID check (P9 review).
          if grep -rE '"ascAppId"\s*:\s*"[0-9]{10}"' \
              --include='*.json' --include='*.md' \
              --exclude-dir=node_modules --exclude-dir=.git \
              --exclude-dir=_bmad-output . ; then
            echo "::error::Literal ASC App ID found in source. Use \$EXPO_ASC_APP_ID env reference."
            MATCHED=1
          fi
          [ "$MATCHED" -eq 0 ] || exit 1
          echo "✓ No submit credentials in source files"

      - name: Validate SQL migrations
        run: |
          # Ensure all migration files parse as valid SQL (basic syntax check)
          for f in supabase/migrations/*.sql; do
            if [ -f "$f" ]; then
              # Check for common syntax issues: unmatched quotes, missing semicolons at EOF
              if ! tail -c 1 "$f" | grep -q ';' && ! tail -1 "$f" | grep -qE '^\s*(\$\$;|;)\s*$'; then
                echo "Warning: $f may be missing a trailing semicolon"
              fi
              echo "✓ $f"
            fi
          done

      - name: Expo Doctor
        run: npx expo-doctor@latest
        continue-on-error: true  # informational — don't fail CI on warnings
