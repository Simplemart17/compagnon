name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Type Check & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

      - name: Tests
        run: npm test -- --no-coverage

      - name: Hex color check
        run: npm run check:colors

      - name: Sentry DSN leak guard
        run: |
          # Story 9-3: prevent regression of the leak that triggered the story.
          # A DSN URL must never live in source — only in EXPO_PUBLIC_SENTRY_DSN env.
          # Pattern matches both regional and non-regional Sentry ingest hosts.
          if grep -rE 'https://[A-Za-z0-9]+@[A-Za-z0-9.]+\.ingest(\.[a-z]+)?\.sentry\.io/[0-9]+' \
              --include='*.json' --include='*.ts' --include='*.tsx' --include='*.js' \
              --include='*.yml' --include='*.yaml' --include='*.md' \
              --exclude-dir=node_modules --exclude-dir=.git . ; then
            echo "::error::Sentry DSN URL found in source. DSN must only live in EXPO_PUBLIC_SENTRY_DSN env (see story 9-3)."
            exit 1
          fi
          echo "✓ No Sentry DSN URL in source files"

      - name: Validate SQL migrations
        run: |
          # Ensure all migration files parse as valid SQL (basic syntax check)
          for f in supabase/migrations/*.sql; do
            if [ -f "$f" ]; then
              # Check for common syntax issues: unmatched quotes, missing semicolons at EOF
              if ! tail -c 1 "$f" | grep -q ';' && ! tail -1 "$f" | grep -qE '^\s*(\$\$;|;)\s*$'; then
                echo "Warning: $f may be missing a trailing semicolon"
              fi
              echo "✓ $f"
            fi
          done

      - name: Expo Doctor
        run: npx expo-doctor@latest
        continue-on-error: true  # informational — don't fail CI on warnings
