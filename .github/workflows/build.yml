name: EAS Build

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile
        required: true
        default: preview
        type: choice
        options: [development, preview, production]
      platform:
        description: Platform
        required: true
        default: all
        type: choice
        options: [all, ios, android]

jobs:
  build:
    name: EAS Build (${{ github.event.inputs.profile || 'preview' }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: EAS Build
        env:
          # Bundled into the JS at build time; without these the app crashes at
          # boot trying to construct a Supabase client with URL(""). Same
          # secrets are reused by .github/workflows/ota-update.yml.
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_POSTHOG_API_KEY: ${{ secrets.EXPO_PUBLIC_POSTHOG_API_KEY }}
          EXPO_PUBLIC_POSTHOG_HOST: ${{ secrets.EXPO_PUBLIC_POSTHOG_HOST }}
        run: |
          eas build \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --platform ${{ github.event.inputs.platform || 'all' }} \
            --non-interactive \
            --no-wait
